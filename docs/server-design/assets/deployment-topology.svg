<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760">
  <defs>
    <style>
      .title { font: 700 28px Arial, sans-serif; fill: #111827; }
      .zone { fill: #f8fafc; stroke: #9ca3af; stroke-width: 2; rx: 14; ry: 14; }
      .svc { fill: #eef2ff; stroke: #4f46e5; stroke-width: 2; rx: 10; ry: 10; }
      .db { fill: #ecfeff; stroke: #0e7490; stroke-width: 2; rx: 10; ry: 10; }
      .txt { font: 600 16px Arial, sans-serif; fill: #111827; }
      .small { font: 500 13px Arial, sans-serif; fill: #374151; }
      .edge { stroke: #111827; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111827"/>
    </marker>
  </defs>

  <text x="40" y="50" class="title">Deployment Topology (Single Region, Production-Ready)</text>

  <rect x="60" y="90" width="1280" height="160" class="zone"/>
  <text x="90" y="125" class="txt">DMZ / Ingress Zone</text>
  <rect x="100" y="145" width="260" height="78" class="svc"/>
  <text x="168" y="178" class="small">Load Balancer</text>
  <rect x="410" y="145" width="280" height="78" class="svc"/>
  <text x="490" y="178" class="small">Nginx Gateway</text>
  <rect x="740" y="145" width="280" height="78" class="svc"/>
  <text x="822" y="178" class="small">WAF (Optional)</text>

  <rect x="60" y="280" width="820" height="210" class="zone"/>
  <text x="90" y="315" class="txt">Application Zone</text>
  <rect x="100" y="340" width="340" height="120" class="svc"/>
  <text x="174" y="374" class="small">Spring Boot App #1</text>
  <text x="150" y="398" class="small">API + Rule + WebSocket</text>
  <rect x="500" y="340" width="340" height="120" class="svc"/>
  <text x="574" y="374" class="small">Spring Boot App #2</text>
  <text x="560" y="398" class="small">Horizontal scaling</text>

  <rect x="920" y="280" width="420" height="210" class="zone"/>
  <text x="950" y="315" class="txt">Data Zone</text>
  <rect x="950" y="340" width="160" height="120" class="db"/>
  <text x="1002" y="374" class="small">MySQL</text>
  <rect x="1130" y="340" width="180" height="120" class="db"/>
  <text x="1188" y="374" class="small">Redis</text>

  <rect x="60" y="520" width="1280" height="180" class="zone"/>
  <text x="90" y="555" class="txt">Analytics and Ops Zone</text>
  <rect x="100" y="580" width="240" height="92" class="db"/>
  <text x="160" y="616" class="small">InfluxDB 3</text>
  <rect x="380" y="580" width="220" height="92" class="svc"/>
  <text x="452" y="616" class="small">Prometheus</text>
  <rect x="640" y="580" width="220" height="92" class="svc"/>
  <text x="722" y="616" class="small">Grafana</text>
  <rect x="900" y="580" width="200" height="92" class="svc"/>
  <text x="968" y="616" class="small">Loki/ELK</text>
  <rect x="1140" y="580" width="180" height="92" class="svc"/>
  <text x="1178" y="616" class="small">Backup</text>

  <path d="M360 184 L410 184" class="edge"/>
  <path d="M690 184 L740 184" class="edge"/>
  <path d="M550 223 L280 340" class="edge"/>
  <path d="M550 223 L670 340" class="edge"/>
  <path d="M840 400 L950 400" class="edge"/>
  <path d="M840 400 L1130 400" class="edge"/>
  <path d="M670 460 L220 580" class="edge"/>
  <path d="M670 460 L490 580" class="edge"/>
  <path d="M670 460 L750 580" class="edge"/>
  <path d="M670 460 L1000 580" class="edge"/>
  <path d="M1030 460 L1230 580" class="edge"/>
</svg>

