<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620" viewBox="0 0 1100 620">
  <defs>
    <style>
      .title { font: 700 26px Arial, sans-serif; fill: #111827; }
      .state { fill: #eef2ff; stroke: #4f46e5; stroke-width: 2; rx: 12; ry: 12; }
      .txt { font: 600 16px Arial, sans-serif; fill: #111827; }
      .edge { stroke: #111827; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .label { font: 500 13px Arial, sans-serif; fill: #374151; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111827"/>
    </marker>
  </defs>

  <text x="40" y="50" class="title">Rule Engine State Machine</text>

  <rect x="90" y="170" width="180" height="72" class="state"/>
  <text x="140" y="212" class="txt">NORMAL</text>

  <rect x="360" y="170" width="220" height="72" class="state"/>
  <text x="420" y="212" class="txt">OBSERVE</text>

  <rect x="700" y="170" width="220" height="72" class="state"/>
  <text x="748" y="212" class="txt">ALERTING</text>

  <rect x="700" y="360" width="220" height="72" class="state"/>
  <text x="748" y="402" class="txt">COOLDOWN</text>

  <path d="M270 206 L360 206" class="edge"/>
  <text x="280" y="188" class="label">risk >= low threshold</text>

  <path d="M580 206 L700 206" class="edge"/>
  <text x="590" y="188" class="label">duration reached</text>

  <path d="M810 242 L810 360" class="edge"/>
  <text x="824" y="305" class="label">alert created</text>

  <path d="M700 396 L470 396 L470 242" class="edge"/>
  <text x="500" y="382" class="label">cooldown expired + still high risk</text>

  <path d="M470 170 L470 110 L180 110 L180 170" class="edge"/>
  <text x="210" y="100" class="label">recover >= recover_sec</text>

  <path d="M700 206 L640 206 L640 520 L180 520 L180 242" class="edge"/>
  <text x="250" y="510" class="label">alert closed and risk back to normal</text>
</svg>

