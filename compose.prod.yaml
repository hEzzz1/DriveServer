services:
  web:
    build:
      context: ${FRONTEND_CONTEXT:-../DriveWeb/web}
      dockerfile: Dockerfile
    image: driveweb-frontend:latest
    container_name: driveweb-frontend
    restart: unless-stopped
    expose:
      - "80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  mysql:
    image: mysql:8.4
    container_name: driveserver-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-drive_server}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_general_ci
    volumes:
      - ./docker-data/mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.2
    container_name: driveserver-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - ./docker-data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  influxdb3:
    image: influxdb:3-core
    container_name: driveserver-influxdb3
    restart: unless-stopped
    command: >
      influxdb3 serve
      --node-id driveserver-node
      --object-store file
      --data-dir /var/lib/influxdb3
    volumes:
      - ./docker-data/influxdb3:/var/lib/influxdb3

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: driveserver-app:latest
    container_name: driveserver-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-drive_server}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DB_USERNAME: ${DB_USERNAME:-root}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      SERVER_PORT: ${SERVER_PORT:-8080}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRE_SECONDS: ${JWT_EXPIRE_SECONDS:-7200}
      JWT_ISSUER: ${JWT_ISSUER:-DriveServer}
      OSS_CONFIG_FILE: ${OSS_CONFIG_FILE:-/app/config/oss.yaml}
    volumes:
      - ./config/oss.yaml:/app/config/oss.yaml:ro
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent --show-error http://127.0.0.1:${SERVER_PORT:-8080}/actuator/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  nginx:
    image: nginx:1.27
    container_name: driveserver-nginx
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
      app:
        condition: service_healthy
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
