services:
  mysql:
    image: mysql:8.4
    container_name: driveserver-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: drive_server
    ports:
      - "3306:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_general_ci
    volumes:
      - ./docker-data/mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p123456 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.2
    container_name: driveserver-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ./docker-data/redis:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  influxdb3:
    image: influxdb:3-core
    container_name: driveserver-influxdb3
    restart: unless-stopped
    command: >
      influxdb3 serve
      --node-id driveserver-node
      --object-store file
      --data-dir /var/lib/influxdb3
    ports:
      - "8181:8181"
    volumes:
      - ./docker-data/influxdb3:/var/lib/influxdb3
