spring:
  datasource:
    url: jdbc:h2:mem:driveserver;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop
  docker:
    compose:
      enabled: false

management:
  health:
    redis:
      enabled: false

auth:
  jwt:
    secret: testDriveServerJwtSecretAtLeast32Bytes
    expire-seconds: 3600
    issuer: DriveServerTest

app:
  cors:
    allowed-origin-patterns:
      - http://localhost:5173
      - http://localhost:4173

ingest:
  security:
    device-tokens: test-device-token
  idempotency:
    store: memory
    ttl: 24h
  stream:
    producer: noop
    key: stream:events
