spring:
  datasource:
    url: jdbc:h2:mem:driveserver;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: none
  docker:
    compose:
      enabled: false

management:
  health:
    redis:
      enabled: false

