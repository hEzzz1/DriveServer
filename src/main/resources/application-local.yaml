spring:
  docker:
    compose:
      enabled: true
  datasource:
    url: jdbc:mysql://localhost:3306/drive_server?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: 123456
  data:
    redis:
      host: localhost
      port: 6379

logging:
  level:
    root: INFO
    com.example.demo: DEBUG
    org.springframework.security: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} [traceId=%X{traceId:-}] - %msg%n"
