spring:
  config:
    import: optional:file:${OSS_CONFIG_FILE:./config/oss.yaml}
  application:
    name: DriveServer
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/drive_server?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
  servlet:
    multipart:
      max-file-size: ${ALERT_EVIDENCE_MAX_FILE_SIZE:20MB}
      max-request-size: ${ALERT_EVIDENCE_MAX_REQUEST_SIZE:25MB}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 3s
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  docker:
    compose:
      enabled: false

server:
  port: ${SERVER_PORT:8080}

app:
  cors:
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:5173,http://localhost:4173}
    allowed-methods: ${CORS_ALLOWED_METHODS:GET,POST,PUT,PATCH,DELETE,OPTIONS}
    allowed-headers: ${CORS_ALLOWED_HEADERS:*}
    exposed-headers: ${CORS_EXPOSED_HEADERS:Authorization}
    allow-credentials: ${CORS_ALLOW_CREDENTIALS:true}
    max-age: ${CORS_MAX_AGE:3600}

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} [traceId=%X{traceId:-}] - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} [traceId=%X{traceId:-}] - %msg%n"

management:
  endpoint:
    health:
      show-details: always
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

auth:
  jwt:
    secret: ${JWT_SECRET:DriveServerDevSecretDriveServerDevSecret1234}
    expire-seconds: ${JWT_EXPIRE_SECONDS:7200}
    issuer: ${JWT_ISSUER:DriveServer}

ingest:
  security:
    device-tokens: ${INGEST_DEVICE_TOKENS:dev-device-token}
  idempotency:
    store: ${INGEST_IDEMPOTENCY_STORE:redis}
    ttl: ${INGEST_IDEMPOTENCY_TTL:24h}
  stream:
    producer: ${INGEST_STREAM_PRODUCER:redis}
    key: ${INGEST_STREAM_KEY:stream:events}

alert:
  evidence:
    storage-type: ${ALERT_EVIDENCE_STORAGE_TYPE:oss}
    client-url-mode: ${ALERT_EVIDENCE_CLIENT_URL_MODE:proxy}
    storage-dir: ${ALERT_EVIDENCE_STORAGE_DIR:data/alert-evidence}
    max-bytes: ${ALERT_EVIDENCE_MAX_BYTES:20971520}
    oss:
      endpoint: ${OSS_ENDPOINT:}
      bucket: ${OSS_BUCKET:}
      access-key-id: ${OSS_ACCESS_KEY_ID:}
      access-key-secret: ${OSS_ACCESS_KEY_SECRET:}
      object-prefix: ${OSS_OBJECT_PREFIX:alert-evidence}
      signed-url-expire-seconds: ${OSS_SIGNED_URL_EXPIRE_SECONDS:300}
