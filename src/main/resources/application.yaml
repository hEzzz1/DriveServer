spring:
  application:
    name: DriveServer
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/drive_server?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 3s
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  docker:
    compose:
      enabled: false

server:
  port: ${SERVER_PORT:8080}

management:
  endpoint:
    health:
      show-details: always
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

auth:
  jwt:
    secret: ${JWT_SECRET:DriveServerDevSecretDriveServerDevSecret1234}
    expire-seconds: ${JWT_EXPIRE_SECONDS:7200}
    issuer: ${JWT_ISSUER:DriveServer}

ingest:
  security:
    device-tokens: ${INGEST_DEVICE_TOKENS:dev-device-token}
  idempotency:
    store: ${INGEST_IDEMPOTENCY_STORE:redis}
    ttl: ${INGEST_IDEMPOTENCY_TTL:24h}
  stream:
    producer: ${INGEST_STREAM_PRODUCER:redis}
    key: ${INGEST_STREAM_KEY:stream:events}
